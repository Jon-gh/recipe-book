<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#g)"/>

  <!-- drop shadow -->
  <ellipse cx="256" cy="398" rx="130" ry="16" fill="#14532d" opacity="0.18"/>

  <!-- ear handles (rendered before body so body covers inner edges) -->
  <rect x="64" y="247" width="47" height="34" rx="17" fill="#f0fdf4" stroke="#14532d" stroke-width="13"/>
  <rect x="402" y="247" width="47" height="34" rx="17" fill="#f0fdf4" stroke="#14532d" stroke-width="13"/>

  <!-- round belly body (cream for contrast against green bg) -->
  <path d="M116 213 Q256 203 392 213 Q454 273 386 352 Q256 388 126 352 Q58 273 116 213 Z"
        fill="#f0fdf4" stroke="#14532d" stroke-width="13" stroke-linejoin="round"/>

  <!-- lid arch -->
  <path d="M84 195 Q256 138 428 195 Z"
        fill="#16a34a" stroke="#14532d" stroke-width="13" stroke-linejoin="round"/>

  <!-- lid band -->
  <rect x="74" y="187" width="364" height="29" rx="14" fill="#16a34a" stroke="#14532d" stroke-width="13"/>

  <!-- sprout stem -->
  <line x1="256" y1="143" x2="256" y2="107" stroke="#14532d" stroke-width="8" stroke-linecap="round"/>

  <!-- left leaf -->
  <g transform="translate(256,107) rotate(-32)">
    <path d="M0 0 C -15.6 -10.4 -15.6 -36.4 0 -46.8 C 15.6 -36.4 15.6 -10.4 0 0 Z"
          fill="#4ade80" stroke="#14532d" stroke-width="6.5" stroke-linejoin="round"/>
  </g>

  <!-- right leaf -->
  <g transform="translate(256,107) rotate(32)">
    <path d="M0 0 C -15.6 -10.4 -15.6 -36.4 0 -46.8 C 15.6 -36.4 15.6 -10.4 0 0 Z"
          fill="#4ade80" stroke="#14532d" stroke-width="6.5" stroke-linejoin="round"/>
  </g>

  <!-- knob -->
  <circle cx="256" cy="143" r="17" fill="#14532d"/>

  <!-- eyes -->
  <circle cx="217" cy="268" r="16" fill="#14532d"/>
  <circle cx="221" cy="263" r="5" fill="#fff"/>
  <circle cx="295" cy="268" r="16" fill="#14532d"/>
  <circle cx="300" cy="263" r="5" fill="#fff"/>

  <!-- smile -->
  <path d="M230 299 q26 23 52 0" fill="none" stroke="#14532d" stroke-width="9" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="191" cy="294" rx="16" ry="9" fill="#fb7185" opacity="0.55"/>
  <ellipse cx="321" cy="294" rx="16" ry="9" fill="#fb7185" opacity="0.55"/>
</svg>
