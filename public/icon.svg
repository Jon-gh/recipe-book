<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="page-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-6%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect width="512" height="256" rx="112" fill="white" opacity="0.05"/>

  <!-- Book group with shadow -->
  <g filter="url(#shadow)">
    <!-- Left page (slightly angled — book is open) -->
    <path d="M106 186 C104 164 122 152 144 150 L250 140 L250 376 L144 364 C122 362 104 350 106 372 Z"
          fill="url(#page-left)"/>

    <!-- Right page -->
    <path d="M262 140 L368 150 C390 152 408 164 406 186 L406 372 C408 394 390 378 368 364 L262 376 Z"
          fill="#f0fdf4"/>

    <!-- Book spine -->
    <rect x="246" y="136" width="20" height="244" rx="7" fill="#166534"/>

    <!-- Spine highlight -->
    <rect x="250" y="136" width="6" height="244" rx="3" fill="#16a34a" opacity="0.5"/>
  </g>

  <!-- Bookmark ribbon (top of spine) -->
  <path d="M252 130 L264 130 L264 162 L258 156 L252 162 Z" fill="#dc2626"/>

  <!-- === LEFT PAGE: recipe text === -->

  <!-- Title line -->
  <rect x="130" y="176" width="90" height="11" rx="5.5" fill="#16a34a" opacity="0.9"/>

  <!-- Divider -->
  <rect x="130" y="200" width="98" height="2" rx="1" fill="#bbf7d0"/>

  <!-- Body lines -->
  <rect x="130" y="212" width="78" height="8" rx="4" fill="#86efac"/>
  <rect x="130" y="228" width="90" height="8" rx="4" fill="#86efac"/>
  <rect x="130" y="244" width="66" height="8" rx="4" fill="#86efac"/>

  <rect x="130" y="268" width="82" height="8" rx="4" fill="#86efac"/>
  <rect x="130" y="284" width="70" height="8" rx="4" fill="#86efac"/>
  <rect x="130" y="300" width="88" height="8" rx="4" fill="#86efac"/>

  <rect x="130" y="324" width="74" height="8" rx="4" fill="#bbf7d0"/>
  <rect x="130" y="340" width="60" height="8" rx="4" fill="#bbf7d0"/>

  <!-- === RIGHT PAGE: fork === -->

  <!-- Fork — centered at x=334, spanning y=192 to y=354 -->

  <!-- Tine 1 -->
  <rect x="314" y="192" width="10" height="58" rx="5" fill="#16a34a"/>
  <!-- Tine 2 -->
  <rect x="330" y="192" width="10" height="58" rx="5" fill="#16a34a"/>
  <!-- Tine 3 -->
  <rect x="346" y="192" width="10" height="58" rx="5" fill="#16a34a"/>

  <!-- Fork shoulder (joins tines to handle) -->
  <rect x="314" y="244" width="42" height="12" rx="5" fill="#16a34a"/>

  <!-- Handle -->
  <rect x="326" y="253" width="18" height="100" rx="9" fill="#16a34a"/>

  <!-- Small leaf accent (top-right of right page) -->
  <ellipse cx="382" cy="172" rx="14" ry="9" fill="#22c55e" opacity="0.5" transform="rotate(-30 382 172)"/>
  <ellipse cx="370" cy="164" rx="10" ry="7" fill="#22c55e" opacity="0.35" transform="rotate(20 370 164)"/>
  <line x1="382" y1="178" x2="376" y2="158" stroke="#16a34a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
